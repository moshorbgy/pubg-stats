<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Intelligence Hub | Secure</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #22d3ee; --text: #f8fafc; --success: #4ade80; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 70px; background: #020617; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; border-left: 1px solid var(--panel); }
        .nav-icon { width: 45px; height: 45px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--panel); border: none; color: white; font-size: 1.2rem; }
        .nav-icon.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        #ai-panel { width: 350px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 0.9rem; max-width: 85%; }
        .msg.ai { background: #334155; border-right: 3px solid var(--accent); align-self: flex-start; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; }
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn-main { background: var(--accent); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; border: none; margin-top: 10px; }
        input, textarea { background: #020617; border: 1px solid #334155; color: #fff; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; }
    </style>
</head>
<body>

    <aside id="ai-panel">
        <div style="padding:15px; border-bottom:1px solid var(--accent)"><h4>🤖 Gemini PRO</h4></div>
        <div class="chat-box" id="chatBox">
            <div class="msg ai">أهلاً بك! أنا جاهز لتحليل الـ 72 ماتش بتوعك.</div>
        </div>
        <div style="padding:15px; display:flex; gap:5px;">
            <input type="text" id="aiInput" placeholder="اسألني أي شيء..." onkeypress="if(event.key==='Enter') askGemini()">
            <button onclick="askGemini()" style="background:var(--accent); border:none; padding:10px; border-radius:5px;">➔</button>
        </div>
    </aside>

    <nav>
        <button class="nav-icon active" onclick="showPage('match-entry', this)">📝</button>
        <button class="nav-icon" onclick="showPage('teams-list', this)">👥</button>
    </nav>

    <main>
        <div id="match-entry" class="page" style="display:block">
            <div class="card">
                <h3>المزامنة وإدارة البيانات</h3>
                <input type="date" id="mDate">
                <textarea id="mIds" rows="3" placeholder="ضع Match IDs هنا..."></textarea>
                <button class="btn-main" onclick="syncMatches()">بدء المزامنة</button>
                
                <!-- أزرار الأمان (Export/Import) في مكانها الصحيح -->
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-main" onclick="exportData()" style="background:#6366f1; color:white;">💾 Export</button>
                    <button class="btn-main" onclick="document.getElementById('importFile').click()" style="background:#8b5cf6; color:white;">📂 Import</button>
                    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                </div>
                <div id="log" style="margin-top:10px; font-size:0.8rem; color:#94a3b8;">Log: Ready...</div>
            </div>
        </div>
    </main>

<script>
    const GEMINI_API_KEY = "AIzaSyBIWL4qRGlOq02HeDllImFDtQaWL9V21YM"; // الـ Key بتاعك مدمج
    let db;
    const request = indexedDB.open("PUBG_Pro_Final", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("teams", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => db = e.target.result;

    function exportData() {
        db.transaction("teams").objectStore("teams").getAll().onsuccess = e => {
            const blob = new Blob([JSON.stringify(e.target.result)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `PUBG_Data_Backup.json`;
            a.click();
        };
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = event => {
            const data = JSON.parse(event.target.result);
            const tx = db.transaction("teams", "readwrite");
            data.forEach(item => { delete item.id; tx.objectStore("teams").add(item); });
            tx.oncomplete = () => location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    async function askGemini() {
        const input = document.getElementById('aiInput');
        const box = document.getElementById('chatBox');
        if(!input.value) return;
        
        const userText = input.value;
        box.innerHTML += `<div class="msg user">${userText}</div>`;
        input.value = "";

        const allData = await new Promise(r => {
            db.transaction("teams").objectStore("teams").getAll().onsuccess = e => r(e.target.result);
        });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `حلل هذه البيانات: ${JSON.stringify(allData)}. السؤال: ${userText}` }] }] })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.candidates[0].content.parts[0].text}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai">تأكد من وجود إنترنت وبيانات مسجلة.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
