<!-- أضف هذه الأزرار داخل صفحة الـ Match Entry (📝) تحت زر المزامنة -->
<div class="card" style="display:flex; gap:10px; background: rgba(34,211,238,0.05);">
    <button class="btn-main" onclick="exportData()" style="background:#6366f1; color:white;">💾 حفظ نسخة احتياطية (Export)</button>
    <button class="btn-main" onclick="document.getElementById('importFile').click()" style="background:#8b5cf6; color:white;">📂 استعادة بيانات (Import)</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
</div>

<script>
    // تأكد من وضع الـ Key بتاعك هنا
    const GEMINI_API_KEY = "AIzaSyBIWL4qRGlOq02HeDllImFDtQaWL9V21YM"; 

    // --- دالة تصدير البيانات (Export) ---
    async function exportData() {
        const allTeams = await new Promise(r => {
            db.transaction("teams").objectStore("teams").getAll().onsuccess = e => r(e.target.result);
        });
        const blob = new Blob([JSON.stringify(allTeams)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `PUBG_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    // --- دالة استيراد البيانات (Import) ---
    function importData(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            const tx = db.transaction("teams", "readwrite");
            const store = tx.objectStore("teams");
            data.forEach(item => {
                delete item.id; // للسماح للـ DB بتوليد IDs جديدة
                store.add(item);
            });
            tx.oncomplete = () => {
                alert("تم استعادة كافة الماتشات والفرق بنجاح!");
                location.reload();
            };
        };
        reader.readAsText(file);
    }

    // --- تحديث دالة الـ AI لتكون "ذكية" فعلياً ---
    async function askGemini() {
        const input = document.getElementById('aiInput');
        const box = document.getElementById('chatBox');
        const userText = input.value.trim();
        if(!userText) return;

        box.innerHTML += `<div class="msg user">${userText}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const allData = await new Promise(r => {
            db.transaction("teams").objectStore("teams").getAll().onsuccess = e => r(e.target.result);
        });

        // إرسال البيانات الحقيقية لـ Gemini
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `أنت محلل PUBG محترف. إليك بيانات المستخدم الحالية (الفرق والماتشات): ${JSON.stringify(allData).slice(0, 5000)}. سؤال المستخدم: ${userText}` }] }]
                })
            });
            const result = await response.json();
            const reply = result.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${reply}</div>`;
        } catch (err) {
            box.innerHTML += `<div class="msg ai">تأكد من رفع البيانات أولاً لكي أستطيع تحليلها.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
